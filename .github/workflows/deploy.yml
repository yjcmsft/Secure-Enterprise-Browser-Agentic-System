name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  AZURE_LOCATION: centralus

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run Microsoft Security DevOps
        id: msdo
        uses: microsoft/security-devops-action@v1
        continue-on-error: true
      - name: Security scan non-blocking notice
        if: ${{ steps.msdo.outcome == 'failure' }}
        run: echo "::notice::Security scan found findings; continuing because this check is configured as non-blocking."
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - name: Validate Bicep template
        uses: Azure/CLI@v2
        with:
          inlineScript: az bicep build --file infra/main.bicep

  deploy-staging:
    needs: test
    if: ${{ vars.AZURE_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: staging
    env:
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME || 'secure-browser-agent-staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Authenticate azd
        run: azd auth login --client-id ${{ secrets.AZURE_CLIENT_ID }} --federated-credential-provider github --tenant-id ${{ secrets.AZURE_TENANT_ID }}

      - name: Provision & deploy to staging
        run: |
          az group create --name rg-browser-agent-staging --location ${{ env.AZURE_LOCATION }} --output none 2>/dev/null || true
          azd env select ${{ env.AZURE_ENV_NAME }} 2>/dev/null || \
            azd env new ${{ env.AZURE_ENV_NAME }} --location ${{ env.AZURE_LOCATION }} --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} --no-prompt
          azd provision --no-prompt
          azd deploy --no-prompt
        env:
          AZURE_ENV_NAME: ${{ env.AZURE_ENV_NAME }}
          AZURE_RESOURCE_GROUP: rg-browser-agent-staging
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Smoke-test staging health endpoint
        continue-on-error: true
        run: |
          AGENT_URL=$(azd env get-value AZURE_CONTAINER_APP_URL 2>/dev/null || echo "")
          if [ -n "$AGENT_URL" ]; then
            curl --fail --retry 5 --retry-delay 10 "$AGENT_URL/health" || echo "::warning::Staging health check failed — app may still be starting"
          fi

  deploy-prod:
    needs: deploy-staging
    if: ${{ vars.AZURE_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    env:
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME || 'secure-browser-agent-prod' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Authenticate azd
        run: azd auth login --client-id ${{ secrets.AZURE_CLIENT_ID }} --federated-credential-provider github --tenant-id ${{ secrets.AZURE_TENANT_ID }}

      - name: Provision & deploy to production
        run: |
          az group create --name rg-browser-agent-prod --location ${{ env.AZURE_LOCATION }} --output none 2>/dev/null || true
          azd env select ${{ env.AZURE_ENV_NAME }} 2>/dev/null || \
            azd env new ${{ env.AZURE_ENV_NAME }} --location ${{ env.AZURE_LOCATION }} --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} --no-prompt
          azd provision --no-prompt
          azd deploy --no-prompt
        env:
          AZURE_ENV_NAME: ${{ env.AZURE_ENV_NAME }}
          AZURE_RESOURCE_GROUP: rg-browser-agent-prod
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Smoke-test production health endpoint
        continue-on-error: true
        run: |
          AGENT_URL=$(azd env get-value AZURE_CONTAINER_APP_URL 2>/dev/null || echo "")
          if [ -n "$AGENT_URL" ]; then
            curl --fail --retry 5 --retry-delay 10 "$AGENT_URL/health" || echo "::warning::Production health check failed — app may still be starting"
          fi

      - name: Upload agent configuration package
        run: |
          cd app-package
          zip -r ../secure-browser-agent-config.zip .
          echo "::notice::Agent config package built at secure-browser-agent-config.zip — deploy via Azure AI Foundry portal or az ai agent CLI"
